<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админ-панель — IKSEM</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --charcoal: #2B2B2B;
            --ironclad: #565656;
            --urban-fog: #848484;
            --moonlit: #B3B3B3;
            --cloud-veil: #E0E0E0;
            --bg: #F5F5F5;
            --white: #FFFFFF;
            --font: 'Inter', -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--charcoal);
            font-weight:300;
            letter-spacing:0.02em;
            line-height:1.5;
        }
        .top-bar {
            position: fixed; top:0; left:0; right:0; z-index:1000;
            display:flex; justify-content:space-between; align-items:center;
            padding:20px 48px;
            background:rgba(255,255,255,0.92);
            backdrop-filter:blur(16px);
            border-bottom:1px solid rgba(43,43,43,0.06);
        }
        .logo {
            font-family:var(--font); font-size:26px; font-weight:200;
            letter-spacing:6px; text-transform:uppercase; text-decoration:none; color:var(--charcoal);
        }
        .logo span { font-weight:700; letter-spacing:0; }
        .nav-links { display:flex; align-items:center; gap:28px; }
        .nav-links a {
            text-decoration:none; color:var(--ironclad); font-size:13px;
            font-weight:400; letter-spacing:1.5px; text-transform:uppercase;
            transition:color 0.2s;
        }
        .nav-links a:hover { color:var(--charcoal); }
        .nav-links .cart-link {
            display:flex; align-items:center; gap:8px;
            background:var(--charcoal); color:var(--white);
            padding:8px 20px; border-radius:40px;
            font-weight:400; font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
            transition:background 0.2s;
        }
        .nav-links .cart-link:hover { background:var(--ironclad); }
        .cart-badge {
            background:var(--white); color:var(--charcoal);
            border-radius:20px; padding:0 10px; font-size:11px; font-weight:600; line-height:20px;
        }
        .user-menu { display:flex; align-items:center; gap:14px; font-size:13px; }
        .user-menu a {
            text-decoration:none; color:var(--ironclad); letter-spacing:1px;
            font-weight:400; text-transform:uppercase; font-size:12px;
        }
        .user-menu a:hover { color:var(--charcoal); }
        .user-menu .email { color:var(--urban-fog); font-size:12px; font-weight:300; letter-spacing:0.5px; }
        .logout-btn {
            background:none; border:none; color:var(--charcoal); cursor:pointer;
            font-size:12px; font-weight:400; letter-spacing:1px; text-transform:uppercase;
            font-family:var(--font);
        }
        .logout-btn:hover { opacity:0.5; }

        .container { max-width:1280px; margin:0 auto; padding:100px 48px 60px; }
        .page-title {
            font-size:32px; font-weight:200; letter-spacing:6px; text-transform:uppercase;
            margin-bottom:40px; border-bottom:1px solid var(--cloud-veil); padding-bottom:20px;
        }

        .admin-card {
            background:var(--white); border-radius:20px; padding:32px;
            box-shadow:0 4px 24px rgba(43,43,43,0.04); margin-bottom:40px;
        }
        .admin-card h2 {
            font-size:13px; font-weight:400; letter-spacing:2px; text-transform:uppercase;
            color:var(--urban-fog); margin-bottom:20px;
        }
        .form-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:20px;
        }
        .form-group { display:flex; flex-direction:column; gap:6px; }
        .form-group label {
            font-size:11px; font-weight:400; letter-spacing:1px; text-transform:uppercase;
            color:var(--urban-fog);
        }
        .form-group input, .form-group textarea, .form-group select {
            padding:12px 16px; border:1px solid var(--cloud-veil); border-radius:12px;
            font-size:14px; font-weight:300; font-family:var(--font);
            background:var(--white); color:var(--charcoal); transition:border 0.2s; outline:none;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color:var(--charcoal);
        }
        .form-group textarea { resize:vertical; min-height:80px; }
        .form-group input[type="file"] { padding:10px; }

        .btn {
            background:var(--charcoal); color:var(--white); border:none;
            padding:12px 32px; border-radius:40px;
            font-size:12px; font-weight:400; letter-spacing:2px; text-transform:uppercase;
            cursor:pointer; transition:background 0.2s; font-family:var(--font);
        }
        .btn:hover { background:var(--ironclad); }
        .btn-danger { background:transparent; color:var(--charcoal); border:1px solid var(--cloud-veil); }
        .btn-danger:hover { background:var(--charcoal); color:var(--white); border-color:var(--charcoal); }
        .btn-edit { background:transparent; color:var(--charcoal); border:1px solid var(--cloud-veil); }
        .btn-edit:hover { background:var(--charcoal); color:var(--white); border-color:var(--charcoal); }
        .btn-sm { padding:6px 16px; font-size:11px; }

        .products-table { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:14px; }
        th, td { padding:14px 16px; text-align:left; border-bottom:1px solid var(--cloud-veil); }
        th { font-size:11px; font-weight:400; letter-spacing:1px; text-transform:uppercase; color:var(--urban-fog); }
        .product-actions { display:flex; gap:8px; flex-wrap:wrap; }

        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(43,43,43,0.5); backdrop-filter:blur(4px);
            justify-content:center; align-items:center; z-index:2000;
        }
        .modal.open { display:flex; }
        .modal-content {
            background:var(--white); border-radius:24px; padding:32px;
            max-width:560px; width:90%; max-height:90vh; overflow-y:auto;
            animation:modalIn 0.3s ease;
        }
        @keyframes modalIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
        .modal-content h3 {
            font-size:20px; font-weight:300; letter-spacing:3px; text-transform:uppercase;
            margin-bottom:24px;
        }
        .modal-actions { display:flex; gap:12px; justify-content:flex-end; margin-top:24px; }
        .images-list { display:flex; gap:12px; flex-wrap:wrap; margin:12px 0; }
        .image-item { position:relative; width:80px; height:80px; border-radius:12px; overflow:hidden; background:var(--cloud-veil); }
        .image-item img { width:100%; height:100%; object-fit:cover; }
        .image-item .remove-img {
            position:absolute; top:-6px; right:-6px;
            background:var(--charcoal); color:var(--white); border:none;
            border-radius:50%; width:22px; height:22px; cursor:pointer; font-size:12px;
        }
        .add-image-row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin-top:12px; }

        .toast {
            position:fixed; bottom:32px; right:32px; max-width:400px; min-width:280px;
            background:var(--white); border-radius:16px; padding:20px 24px;
            box-shadow:0 12px 48px rgba(43,43,43,0.15);
            display:flex; align-items:center; gap:16px; z-index:9999;
            transform:translateY(20px); opacity:0; visibility:hidden;
            transition:all 0.4s cubic-bezier(0.22,1,0.36,1);
            border:1px solid var(--cloud-veil);
        }
        .toast.show { transform:translateY(0); opacity:1; visibility:visible; }
        .toast-icon { flex-shrink:0; width:40px; height:40px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; color:var(--charcoal); }
        .toast-icon svg { width:22px; height:22px; }
        .toast-content { flex:1; }
        .toast-title { font-size:13px; font-weight:500; letter-spacing:1px; text-transform:uppercase; color:var(--charcoal); margin-bottom:2px; }
        .toast-message { font-size:13px; font-weight:300; color:var(--ironclad); letter-spacing:0.3px; }
        .toast-close { background:none; border:none; cursor:pointer; padding:4px; color:var(--moonlit); transition:color 0.2s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .toast-close:hover { color:var(--charcoal); }
        .toast-close svg { width:18px; height:18px; }
        .toast.success .toast-icon { color:#2e7d32; }
        .toast.error .toast-icon { color:#c62828; }
        .toast.info .toast-icon { color:var(--urban-fog); }

        @media (max-width: 768px) {
    .top-bar {
        padding: 12px 16px;
        flex-wrap: nowrap;
        gap: 8px;
        overflow-x: auto;
        background: rgba(255,255,255,0.98);
    }
    .logo {
        font-size: 18px;
        letter-spacing: 3px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .nav-links {
        gap: 12px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    .nav-links a:not(.cart-link) {
        display: inline-block !important;
        font-size: 11px;
        letter-spacing: 1px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .nav-links .cart-link {
        padding: 6px 14px;
        font-size: 10px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    .user-menu {
        gap: 6px;
        flex-wrap: nowrap;
        flex-shrink: 0;
    }
    .user-menu a {
        font-size: 10px;
        letter-spacing: 0.5px;
        white-space: nowrap;
    }
    .user-menu .email {
        font-size: 10px;
        max-width: 80px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
    .logout-btn {
        font-size: 10px;
    }

    .container {
        padding: 80px 16px 40px;
    }
    .admin-card {
        padding: 16px;
    }
    .form-grid {
        grid-template-columns: 1fr;
        gap: 12px;
    }
    .page-title {
        font-size: 24px;
        letter-spacing: 4px;
    }
    .products-table table {
        font-size: 12px;
    }
    .products-table th,
    .products-table td {
        padding: 10px 8px;
    }
    .product-actions {
        gap: 4px;
    }
    .btn-sm {
        padding: 4px 10px;
        font-size: 10px;
    }
}
    </style>
</head>
<body>

    <header class="top-bar">
        <a href="/" class="logo">IK<span>SEM</span></a>
        <div class="nav-links">
            <a href="/orders.html">Заказы</a>
            <a href="/admin-orders.html" style="background:var(--charcoal);color:var(--white);padding:8px 20px;border-radius:40px;font-size:12px;letter-spacing:1.5px;">Заказы</a>
            <a href="/cart.html" class="cart-link">
                Корзина <span class="cart-badge" id="cart-count">0</span>
            </a>
            <div class="user-menu">
                <span class="email" id="user-email"></span>
                <a href="/login.html" id="auth-link">Войти</a>
                <button class="logout-btn" id="logout-btn" style="display:none;" onclick="logout()">Выйти</button>
            </div>
        </div>
    </header>

    <div class="container">
        <h1 class="page-title">Админ-панель</h1>

        <!-- Добавление товара -->
        <div class="admin-card">
            <h2>➕ Добавить товар</h2>
            <form id="add-product-form" enctype="multipart/form-data">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Название *</label>
                        <input type="text" id="prod-name" required />
                    </div>
                    <div class="form-group">
                        <label>Цена (₽) *</label>
                        <input type="number" id="prod-price" required />
                    </div>
                    <div class="form-group">
                        <label>Размеры</label>
                        <input type="text" id="prod-size" placeholder="XS,S,M,L,XL" />
                    </div>
                    <div class="form-group">
                        <label>Цвет</label>
                        <input type="text" id="prod-color" />
                    </div>
                    <div class="form-group">
                        <label>Состав</label>
                        <input type="text" id="prod-composition" />
                    </div>
                    <div class="form-group">
                        <label>Описание</label>
                        <textarea id="prod-description" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Фото (несколько)</label>
                        <input type="file" id="prod-images" multiple accept="image/*" />
                    </div>
                </div>
                <button type="submit" class="btn" style="margin-top:20px;">Добавить</button>
            </form>
        </div>

        <!-- Список товаров -->
        <div class="admin-card">
            <h2>Управление товарами</h2>
            <div id="products-container"><div style="text-align:center;padding:40px;color:var(--urban-fog);">Загрузка...</div></div>
        </div>
    </div>

    <!-- Модалка редактирования -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3>Редактировать</h3>
            <form id="edit-product-form" enctype="multipart/form-data">
                <div class="form-grid" style="grid-template-columns:1fr;">
                    <div class="form-group"><label>Название</label><input type="text" id="edit-name" required /></div>
                    <div class="form-group"><label>Описание</label><textarea id="edit-description" rows="2"></textarea></div>
                    <div class="form-group"><label>Цена (₽)</label><input type="number" id="edit-price" required /></div>
                    <div class="form-group"><label>Размеры</label><input type="text" id="edit-size" /></div>
                    <div class="form-group"><label>Цвет</label><input type="text" id="edit-color" /></div>
                    <div class="form-group"><label>Состав</label><input type="text" id="edit-composition" /></div>
                    <div class="form-group">
                        <label>Фото</label>
                        <div id="product-images-list" class="images-list"></div>
                        <div class="add-image-row">
                            <input type="file" id="new-image" accept="image/*" />
                            <button type="button" class="btn btn-sm" onclick="addProductImage()">Добавить</button>
                        </div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" onclick="closeModal()">Отмена</button>
                    <button type="submit" class="btn">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <div class="toast-icon" id="toast-icon"></div>
        <div class="toast-content">
            <div class="toast-title" id="toast-title">Готово</div>
            <div class="toast-message" id="toast-message"></div>
        </div>
        <button class="toast-close" onclick="closeToast()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>

    <script>
        let currentEditId = null;
        let toastTimer = null;

        // ===== TOAST =====
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const titleEl = document.getElementById('toast-title');
            const messageEl = document.getElementById('toast-message');
            const icons = {
                success: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17L4 12"/></svg>`,
                error: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`,
                info: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`
            };
            icon.innerHTML = icons[type] || icons.success;
            titleEl.textContent = title || 'Готово';
            messageEl.textContent = message || '';
            toast.classList.remove('success', 'error', 'info', 'show');
            toast.classList.add(type);
            setTimeout(() => toast.classList.add('show'), 10);
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(closeToast, 4000);
        }

        function closeToast() {
            const toast = document.getElementById('toast');
            toast.classList.remove('show');
            if (toastTimer) { clearTimeout(toastTimer); toastTimer = null; }
        }

        // ===== АВТОРИЗАЦИЯ =====
        async function checkAdmin() {
            const res = await fetch('/api/me');
            const data = await res.json();
            if (!data.user || !data.user.is_admin) {
                alert('Доступ запрещён');
                window.location.href = '/';
                return false;
            }
            document.getElementById('user-email').textContent = data.user.email;
            document.getElementById('auth-link').style.display = 'none';
            document.getElementById('logout-btn').style.display = 'inline-block';
            return true;
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        // ===== ТОВАРЫ =====
        async function loadProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            displayProducts(products);
        }

        function displayProducts(products) {
            const container = document.getElementById('products-container');
            if (products.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--urban-fog);">Товаров пока нет</div>';
                return;
            }
            container.innerHTML = `
                <div class="products-table">
                    <table>
                        <thead><tr><th>ID</th><th>Название</th><th>Цена</th><th>Размеры</th><th>Цвет</th><th>Действия</th></tr></thead>
                        <tbody>
                            ${products.map(p => `
                                <tr>
                                    <td>${p.id}</td>
                                    <td>${escapeHtml(p.name)}</td>
                                    <td>${p.price.toLocaleString()} ₽</td>
                                    <td>${escapeHtml(p.size || '-')}</td>
                                    <td>${escapeHtml(p.color || '-')}</td>
                                    <td class="product-actions">
                                        <button class="btn btn-edit btn-sm" onclick="openEditModal(${p.id})">Ред.</button>
                                        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Удалить</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // ===== ДОБАВЛЕНИЕ =====
        document.getElementById('add-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('name', document.getElementById('prod-name').value);
            formData.append('price', document.getElementById('prod-price').value);
            formData.append('size', document.getElementById('prod-size').value);
            formData.append('color', document.getElementById('prod-color').value);
            formData.append('composition', document.getElementById('prod-composition').value);
            formData.append('description', document.getElementById('prod-description').value);
            const files = document.getElementById('prod-images').files;
            for (let f of files) formData.append('images', f);

            try {
                const res = await fetch('/api/admin/products', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    showToast('Товар добавлен', '', 'success');
                    document.getElementById('add-product-form').reset();
                    loadProducts();
                } else {
                    showToast('Ошибка', data.error, 'error');
                }
            } catch (e) {
                showToast('Ошибка', 'Попробуйте позже', 'error');
            }
        });

        // ===== РЕДАКТИРОВАНИЕ =====
        async function openEditModal(id) {
            currentEditId = id;
            const res = await fetch(`/api/products/${id}`);
            const p = await res.json();
            document.getElementById('edit-name').value = p.name || '';
            document.getElementById('edit-description').value = p.description || '';
            document.getElementById('edit-price').value = p.price || '';
            document.getElementById('edit-size').value = p.size || '';
            document.getElementById('edit-color').value = p.color || '';
            document.getElementById('edit-composition').value = p.composition || '';
            document.getElementById('edit-modal').classList.add('open');
            await loadProductImages();
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('open');
            currentEditId = null;
        }

        async function loadProductImages() {
            if (!currentEditId) return;
            const res = await fetch(`/api/products/${currentEditId}/images`);
            const images = await res.json();
            const container = document.getElementById('product-images-list');
            if (images.length === 0) {
                container.innerHTML = '<span style="color:var(--urban-fog);font-size:13px;">Нет фото</span>';
                return;
            }
            container.innerHTML = images.map(img => `
                <div class="image-item">
                    <img src="${img.image_url}" />
                    <button class="remove-img" onclick="deleteImage(${img.id})">×</button>
                </div>
            `).join('');
        }

        async function addProductImage() {
            const input = document.getElementById('new-image');
            if (!input.files[0]) { showToast('Ошибка', 'Выберите фото', 'error'); return; }
            const formData = new FormData();
            formData.append('image', input.files[0]);
            const res = await fetch(`/api/admin/products/${currentEditId}/images`, { method: 'POST', body: formData });
            const data = await res.json();
            if (data.success) {
                showToast('Фото добавлено', '', 'success');
                input.value = '';
                loadProductImages();
            } else {
                showToast('Ошибка', data.error, 'error');
            }
        }

        async function deleteImage(imageId) {
            if (!confirm('Удалить фото?')) return;
            const res = await fetch(`/api/admin/products/images/${imageId}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.success) {
                showToast('Фото удалено', '', 'info');
                loadProductImages();
            } else {
                showToast('Ошибка', data.error, 'error');
            }
        }

        document.getElementById('edit-product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                name: document.getElementById('edit-name').value,
                description: document.getElementById('edit-description').value,
                price: parseInt(document.getElementById('edit-price').value),
                size: document.getElementById('edit-size').value,
                color: document.getElementById('edit-color').value,
                composition: document.getElementById('edit-composition').value
            };
            const res = await fetch(`/api/admin/products/${currentEditId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            });
            const data = await res.json();
            if (data.success) {
                showToast('Товар обновлён', '', 'success');
                closeModal();
                loadProducts();
            } else {
                showToast('Ошибка', data.error, 'error');
            }
        });

        // ===== УДАЛЕНИЕ =====
        async function deleteProduct(id) {
            if (!confirm('Удалить товар?')) return;
            const res = await fetch(`/api/admin/products/${id}`, { method: 'DELETE' });
            const data = await res.json();
            if (data.success) {
                showToast('Товар удалён', '', 'info');
                loadProducts();
            } else {
                showToast('Ошибка', data.error, 'error');
            }
        }

        function escapeHtml(str) { return str ? String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;') : ''; }

        async function updateCartCount() {
            try {
                const res = await fetch('/api/cart');
                if (res.status === 401) { document.getElementById('cart-count').textContent = '0'; return; }
                const data = await res.json();
                document.getElementById('cart-count').textContent = data.items ? data.items.reduce((s, i) => s + i.quantity, 0) : 0;
            } catch (e) {}
        }

        // ===== ЗАПУСК =====
        (async () => {
            if (await checkAdmin()) {
                loadProducts();
                updateCartCount();
            }
        })();
    </script>
</body>
</html>
